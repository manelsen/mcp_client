name = "gleam_mcp"
version = "0.1.0"
description = "MCP (Model Context Protocol) client for Gleam — connect to any MCP server via JSON-RPC 2.0 over STDIO"
licences = ["Apache-2.0"]
repository = { type = "github", user = "manelsen", repo = "gleam_mcp" }
links = [{ title = "Hex", href = "https://hex.pm/packages/gleam_mcp" }]
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
